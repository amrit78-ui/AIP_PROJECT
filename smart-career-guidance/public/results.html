<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Recommendations - CareerAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg glass-nav p-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fa-solid fa-compass text-primary me-2"></i>CareerAI</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item ms-3"><a class="btn btn-outline-light rounded-pill px-4" href="predict.html">New Prediction</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 fade-in">
        <div class="text-center mb-5">
            <h1 class="fw-bold mb-3">Top Career Matches</h1>
            <p class="lead text-white-50">Based on your unique profile, here are the best potential paths for you.</p>
        </div>

        <div class="row justify-content-center" id="resultsContainer">
            <!-- Populated via Javascript -->
        </div>
        
        <div class="text-center mt-5">
            <a href="dashboard.html" class="btn btn-outline-light px-5 py-2 rounded-pill">View in Dashboard</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rawJson = sessionStorage.getItem('lastPrediction');
            const resultsContainer = document.getElementById('resultsContainer');

            if (!rawJson) {
                window.location.href = 'predict.html';
                return;
            }

            try {
                const data = JSON.parse(rawJson);
                if(data.success && data.careers && data.careers.length > 0) {
                    let html = '';
                    const colors = ['#6c5ce7', '#00b894', '#e17055']; // distinct colors for top 3

                    data.careers.forEach((career, index) => {
                        const color = colors[index % colors.length];
                        
                        let tagsHtml = '';
                        if(career.tags && career.tags.length > 0) {
                            tagsHtml = career.tags.map(tag => `<span class="badge badge-glass me-2">${tag}</span>`).join('');
                        }

                        html += `
                            <div class="col-lg-4 col-md-6 mb-4">
                                <div class="glass-panel p-4 h-100 career-card d-flex flex-column" style="border-top: 4px solid ${color}">
                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <div class="fs-1 fw-bold opacity-25">#${index + 1}</div>
                                        <div class="badge text-bg-light rounded-pill px-3 py-2 fw-bold text-dark">${career.matchPercentage || '100%'} Match</div>
                                    </div>
                                    <h3 class="fw-bold mb-3 text-white">${career.title}</h3>
                                    <p class="text-white-50 flex-grow-1">${career.description}</p>
                                    <div class="mt-auto">
                                        <div class="mb-2">${tagsHtml}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    resultsContainer.innerHTML = html;
                } else {
                    resultsContainer.innerHTML = '<div class="col-12 text-center"><p class="text-warning">Could not generate valid recommendations. Please refine your inputs.</p></div>';
                }
            } catch (e) {
                console.error("Failed to parse", e);
                resultsContainer.innerHTML = '<div class="col-12 text-center"><p class="text-danger">An error occurred reading the results.</p></div>';
            }
        });
    </script>
</body>
</html>
