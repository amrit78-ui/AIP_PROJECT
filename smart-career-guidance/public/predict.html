<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Career - CareerAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg glass-nav p-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fa-solid fa-compass text-primary me-2"></i>CareerAI</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item ms-3"><button class="btn btn-outline-light rounded-pill px-4" onclick="logout()">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 fade-in">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-panel p-5">
                    <div class="text-center mb-5">
                        <i class="fa-solid fa-wand-magic-sparkles fa-3x text-primary mb-3"></i>
                        <h2 class="fw-bold">Find Your Ideal Career</h2>
                        <p class="text-white-50">Tell us about your skillset and interests, and our AI will recommend the top 3 fields for you.</p>
                    </div>

                    <form id="predictForm">
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label text-white-50"><i class="fa-solid fa-code me-2"></i>Skills</label>
                                <input type="text" id="skills" class="form-control glass-input py-2" placeholder="e.g. Java, Python" required>
                                <small class="text-white-50 mt-1 d-block">Comma separated</small>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label text-white-50"><i class="fa-solid fa-heart me-2"></i>Interests</label>
                                <input type="text" id="interests" class="form-control glass-input py-2" placeholder="e.g. Technology, Art" required>
                                <small class="text-white-50 mt-1 d-block">Comma separated</small>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label text-white-50"><i class="fa-solid fa-graduation-cap me-2"></i>Academic Marks (%)</label>
                                <input type="number" id="marks" class="form-control glass-input py-2" placeholder="e.g. 85" min="0" max="100" required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label text-white-50"><i class="fa-solid fa-book me-2"></i>Preferred Subjects</label>
                                <input type="text" id="subjects" class="form-control glass-input py-2" placeholder="e.g. Math, Computer Science" required>
                                <small class="text-white-50 mt-1 d-block">Comma separated</small>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-glass btn-lg px-5 py-3 rounded-pill w-100" id="predictBtn">
                                <i class="fa-solid fa-bolt me-2"></i> Analyze & Predict
                            </button>
                            
                            <div id="loading" class="mt-4" style="display: none;">
                                <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
                                <h5 class="mt-3 opacity-75">Analyzing Profile...</h5>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('userEmail')) {
                window.location.href = 'auth.html';
            }
        });

        document.getElementById('predictForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            document.getElementById('predictBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            const userEmail = localStorage.getItem('userEmail');
            const skills = document.getElementById('skills').value.split(',').map(s => s.trim());
            const interests = document.getElementById('interests').value.split(',').map(s => s.trim());
            const marks = parseInt(document.getElementById('marks').value);
            const subjects = document.getElementById('subjects').value.split(',').map(s => s.trim());

            const predictPayload = { skills, interests, marks, preferredSubjects: subjects };

            try {
                // Get Recommendations
                const res = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(predictPayload)
                });
                const aiResult = await res.json();

                // Save to history
                await fetch('/api/predictions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userEmail,
                        skills,
                        interests,
                        marks,
                        subjects,
                        rawApiResponse: JSON.stringify(aiResult)
                    })
                });

                // Store in session and redirect
                sessionStorage.setItem('lastPrediction', JSON.stringify(aiResult));
                window.location.href = 'results.html';

            } catch (err) {
                console.error(err);
                alert('Error predicting career.');
                document.getElementById('predictBtn').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        });

        function logout() {
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userName');
            localStorage.removeItem('userRole');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
