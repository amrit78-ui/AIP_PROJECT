<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup - CareerAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container { max-width: 450px; margin: 80px auto; }
        .nav-tabs .nav-link { color: white; border: none; border-bottom: 2px solid transparent; opacity: 0.6; }
        .nav-tabs .nav-link.active { background: transparent; color: white; border-bottom: 2px solid var(--secondary-color); opacity: 1; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg glass-nav p-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fa-solid fa-compass text-primary me-2"></i>CareerAI</a>
        </div>
    </nav>

    <div class="container fade-in">
        <div class="glass-panel auth-container p-4">
            
            <div id="errorAlert" class="alert btn-glass border-0 py-2 text-center d-none" role="alert"></div>

            <ul class="nav nav-tabs justify-content-center mb-4" id="authTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active fw-bold fs-5" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link fw-bold fs-5" id="signup-tab" data-bs-toggle="tab" data-bs-target="#signup" type="button" role="tab">Sign Up</button>
                </li>
            </ul>

            <div class="tab-content" id="authTabsContent">
                <!-- Login Form -->
                <div class="tab-pane fade show active" id="login" role="tabpanel">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label text-white-50">Email Address</label>
                            <input type="email" id="loginEmail" class="form-control glass-input py-2" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-white-50">Password</label>
                            <input type="password" id="loginPassword" class="form-control glass-input py-2" placeholder="********" required>
                        </div>
                        <button type="submit" class="btn btn-glass w-100 py-2" id="loginBtn">Welcome Back</button>
                    </form>
                </div>

                <!-- Signup Form -->
                <div class="tab-pane fade" id="signup" role="tabpanel">
                    <form id="signupForm">
                        <div class="mb-3">
                            <label class="form-label text-white-50">Full Name</label>
                            <input type="text" id="signupName" class="form-control glass-input py-2" placeholder="Jane Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white-50">Email Address</label>
                            <input type="email" id="signupEmail" class="form-control glass-input py-2" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-white-50">Password</label>
                            <input type="password" id="signupPassword" class="form-control glass-input py-2" placeholder="********" required>
                        </div>
                        <button type="submit" class="btn btn-glass w-100 py-2" id="signupBtn">Create Account</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Loading...';
            btn.disabled = true;

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('userName', data.user.name);
                    localStorage.setItem('userRole', data.user.role);
                    window.location.href = 'dashboard.html';
                } else {
                    showError(data.message || 'Invalid credentials');
                }
            } catch (err) {
                showError('Network error connecting to API');
            } finally {
                btn.innerHTML = 'Welcome Back';
                btn.disabled = false;
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Loading...';
            btn.disabled = true;

            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('userName', data.user.name);
                    localStorage.setItem('userRole', data.user.role);
                    window.location.href = 'dashboard.html';
                } else {
                    showError(data.message || 'Error creating account');
                }
            } catch (err) {
                showError('Network error connecting to API');
            } finally {
                btn.innerHTML = 'Create Account';
                btn.disabled = false;
            }
        });

        function showError(msg) {
            const el = document.getElementById('errorAlert');
            el.innerHTML = msg;
            el.classList.remove('d-none');
            el.classList.add('bg-danger', 'text-white');
        }
    </script>
</body>
</html>
