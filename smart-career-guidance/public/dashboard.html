<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CareerAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg glass-nav p-3">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fa-solid fa-compass text-primary me-2"></i>CareerAI</a>
            <div class="d-flex align-items-center">
                <span class="text-white-50 me-3" id="welcomeMsg"></span>
                <button class="btn btn-outline-light rounded-pill px-3" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="glass-panel sidebar mt-3 ms-3 mb-3 d-none d-md-block">
            <div class="text-center mb-4 pt-3">
                <div class="bg-primary rounded-circle d-inline-flex justify-content-center align-items-center mb-2 shadow" style="width: 60px; height: 60px;">
                    <i class="fa-solid fa-user fs-3 text-white"></i>
                </div>
                <h6 class="mb-0 text-white" id="sidebarName"></h6>
                <small class="text-white-50" id="sidebarRole"></small>
            </div>
            <hr class="border-secondary opacity-25">
            <a href="dashboard.html" class="sidebar-link active"><i class="fa-solid fa-house me-2 w-20px"></i> Overview</a>
            <a href="predict.html" class="sidebar-link"><i class="fa-solid fa-wand-magic-sparkles me-2"></i> New Prediction</a>
            <a href="admin.html" class="sidebar-link d-none" id="adminLink"><i class="fa-solid fa-shield-halved me-2"></i> Admin Panel</a>
        </div>

        <!-- Main Content -->
        <div class="dashboard-content fade-in">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Your Career Overview</h2>
                <a href="predict.html" class="btn btn-glass"><i class="fa-solid fa-plus me-2"></i>New Analysis</a>
            </div>

            <div class="row">
                <!-- Activity Chart -->
                <div class="col-lg-8 mb-4">
                    <div class="glass-panel p-4 h-100">
                        <h5 class="fw-bold mb-3"><i class="fa-solid fa-chart-line me-2 text-primary"></i>Prediction Confidence Trend</h5>
                        <canvas id="matchChart" style="max-height: 250px;"></canvas>
                    </div>
                </div>

                <!-- Stats -->
                <div class="col-lg-4 mb-4">
                    <div class="glass-panel p-4 h-100 d-flex flex-column justify-content-center text-center">
                        <i class="fa-solid fa-clock-rotate-left fa-3x text-secondary mb-3"></i>
                        <h1 class="display-4 fw-bold" id="totalPredictions">-</h1>
                        <p class="text-white-50 mb-0">Total Predictions Made</p>
                    </div>
                </div>
            </div>

            <h4 class="fw-bold mb-3 mt-2"><i class="fa-solid fa-clock-rotate-left me-2"></i>Recent History</h4>
            <div id="historyContainer" class="row">
                <div class="glass-panel p-5 text-center w-100" id="emptyState">
                    <i class="fa-solid fa-spinner fa-spin fa-3x text-white-50 mb-3"></i>
                    <p class="lead text-white-50">Loading predictions...</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const userEmail = localStorage.getItem('userEmail');
            const userName = localStorage.getItem('userName') || 'User';
            const userRole = localStorage.getItem('userRole') || 'user';

            if (!userEmail) {
                window.location.href = 'auth.html';
                return;
            }

            document.getElementById('welcomeMsg').textContent = `Welcome, ${userName}`;
            document.getElementById('sidebarName').textContent = userName;
            document.getElementById('sidebarRole').textContent = userRole;

            if (userRole === 'admin') {
                document.getElementById('adminLink').classList.remove('d-none');
            }

            try {
                const res = await fetch(`/api/predictions/${userEmail}`);
                const data = await res.json();
                
                if (data.success) {
                    renderDashboard(data.history);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('emptyState').innerHTML = '<p class="text-danger">Failed to load history</p>';
            }
        });

        function renderDashboard(history) {
            document.getElementById('totalPredictions').textContent = history.length;
            const container = document.getElementById('historyContainer');
            
            if (history.length === 0) {
                container.innerHTML = `
                    <div class="glass-panel p-5 text-center w-100">
                        <i class="fa-solid fa-folder-open fa-3x text-white-50 mb-3"></i>
                        <p class="lead text-white-50">No predictions found.</p>
                        <a href="predict.html" class="btn btn-outline-light mt-2">Start your first analysis</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            const chartData = [];

            history.slice(0, 5).reverse().forEach((doc, idx) => {
                let title = 'Unknown';
                let matchPercentage = '0';
                try {
                    const parsed = JSON.parse(doc.response || doc.rawApiResponse);
                    if (parsed.careers && parsed.careers.length > 0) {
                        title = parsed.careers[0].title;
                        matchPercentage = parseInt(parsed.careers[0].matchPercentage);
                    }
                } catch(e) {}
                chartData.push(matchPercentage);
            });

            history.slice(0, 3).forEach((doc, idx) => {
                let title = 'Unknown';
                try {
                    const parsed = JSON.parse(doc.response || doc.rawApiResponse);
                    if (parsed.careers && parsed.careers.length > 0) {
                        title = parsed.careers[0].title;
                    }
                } catch(e) {}

                const card = document.createElement('div');
                card.className = 'col-md-4 mb-3';
                card.innerHTML = `
                    <div class="glass-panel p-3">
                        <small class="text-white-50 mb-2 d-block">Marks: ${doc.marks}% | Skills: ${doc.skills ? doc.skills.length : 0}</small>
                        <h6 class="fw-bold text-truncate">Top: ${title}</h6>
                        <button class="btn btn-sm btn-outline-light w-100 mt-2" onclick="alert('Feature coming soon')">View Details</button>
                    </div>
                `;
                container.appendChild(card);
            });

            // Draw chart
            const ctx = document.getElementById('matchChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: chartData.length}, (_, i) => `Analysis ${i+1}`),
                    datasets: [{
                        label: 'Top Career Match %',
                        data: chartData,
                        borderColor: '#a29bfe',
                        backgroundColor: 'rgba(162, 155, 254, 0.2)',
                        borderWidth: 3,
                        pointBackgroundColor: '#6c5ce7',
                        pointBorderColor: '#fff',
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 100, ticks: { color: 'rgba(255,255,255,0.7)' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: 'rgba(255,255,255,0.7)' }, grid: { display: false } }
                    }
                }
            });
        }

        function logout() {
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userName');
            localStorage.removeItem('userRole');
            window.location.href = 'index.html';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
